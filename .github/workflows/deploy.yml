name: BookStacks

on:
  push:
    branches:
      - main

jobs:

  deploy-backend:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Switch to Backend Directory & Clear Existing Containers
        run: |
          cd backend
          docker rm -f bookstacks-backend || true
      
      - name: Run Backend Container
        run: |
          docker run -d --name bookstacks-backend \
            --env-file backend/.env \
            -p 5000:5000 \
            --network bridge \
            bookstacks-backend
      
      - name: Verify Backend Deployment
        run: |
          sleep 10
          curl -f http://localhost:5000/ || exit 1
    
  deploy-frontend:
    runs-on: self-hosted

    steps:
        - name: Checkout Repository
          uses: actions/checkout@v4
        
        - name: Switch to Frontend Directory & Clear Existing Containers
          run: |
            cd frontend
            docker rm -f bookstacks-frontend || true
        
        - name: Run Frontend Container
          run: |
            docker run -d --name bookstacks-frontend \
              --env BACKEND_URL=http://localhost:5000 \
              --network bridge \
              -p 3000:3000 \
              bookstacks-frontend
        
        - name: Verify Frontend Deployment
          run: |
            sleep 10
            curl -f http://localhost:3000/ || exit 1